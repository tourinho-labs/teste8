name: CI - PR

on:
  pull_request:
    branches:
      - main

jobs:
  ci:
    permissions:
      contents: read
      security-events: write
      actions: read
      packages: write
      pull-requests: read
    uses: TourinhoM/org-ci-platform/.github/workflows/ci-pr.yml@main
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
